<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Froggly | Home</title>
        <link rel="stylesheet" href="../css/shared.css">
        <link rel="stylesheet" href="../css/index.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&amp;family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&amp;family=Mukta+Vaani:wght@200;300;400;500;600;700;800&amp;family=Noto+Serif+NP+Hmong:wght@400..700&amp;family=Noto+Serif+Oriya:wght@400..700&amp;family=Nunito:ital,wght@0,200..1000;1,200..1000&amp;display=swap" rel="stylesheet">    
    </head>
    <body>
        <!-- split the navbar into three sections; left, center, and right -->
        <!-- the css will spread them cleanly across the entire bar -->
        <header class="navbar">
            <!-- section 1: left -->
            <div class="navbar-left">
                <span class="logo">Froggly!</span>
            </div>
            <!-- section 2: center -->
            <div class="navbar-center">
                <!-- give the search bar an ID because it will be used to fetch with document.getElementbyId -->
                <input type="text" id="searchInput" placeholder="Looking for something? (¬_ ´¬ )">
            </div>
            <!-- section 3: right -->
            <div class="navbar-right">
                <!-- inbox modal -->
                <div class="inbox-wrapper">
                    <button id="inboxBtn">Inbox</button>
                    <div id="inboxModal" class="inbox-modal hidden">
                        <p class="inbox-title">Inbox</p>
                        <ul id="inboxList"></ul>
                    </div>            
                </div>
                <button id="addPostBtn">Add Post +</button>
                <a class="button-link" href="../index.html">Timeline</a>
                <a class="button-link" href="../html/changelog.html">Changelog</a>
                <a class="button-link" href="../html/wiki.html">WikiFrog</a>

                <!-- profile button -->
                <a href="../html/profile.html" class="profile-link">
                    <img src="../assets/defaultpfp.jpg" alt="Profile" class="navbar-avatar">
                </a>
            </div>
        </header>

        <!-- this section will be empty for the most part and filled with timeline.js -->
        <main id="timeline" class="timeline-grid">
            <!-- posts will be added here! -->
        </main>

        <!-- this is the post modal (initially hidden) -->
        <div id="addPostModal" class="modal hidden">
            <div class="modal-content">
                <button id="closeModalBtn" class="close-btn">&times;</button>
                <h2>New Post</h2>
                <form id="addPostForm">
                    <input type="text" id="imageUrlInput" placeholder="Image or GIF URL">
                    <input type="text" id="tagInput" placeholder="Tags">
                    <input type="text" id="captionInput" placeholder="Caption">
                    <input type="text" id="mediaTypeInput" placeholder="Media Type">
                    <input type="text" id="uploaderInput" placeholder="Your name">
                    <button type="submit" class="submit">Post</button>
                </form>
            </div>
        </div>

        <!-- this is the individual post modal (initially hidden) -->
        <div id="viewPostModal" class="modal hidden">
            <div class="modal-content post-view-content">
                <button id="closeViewPostBtn" class="close-btn">&times;</button>
                <img id="viewPostImage" src="" alt="">
                <div class="post-view-info">
                    <p id="viewPostCaption"></p>
                    <p id="viewPostMeta" class="post-meta"></p>
                    <div class="post-view-actions">
                        <button class="edit-post-btn">Edit</button>
                        <button class="delete-post-btn">Delete</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="../js/data.js"></script>
        <script src="../js/timeline.js"></script>
        <script src="../js/viewPost.js"></script>
        <script src="../js/search.js"></script>
        <script src="../js/addPost.js"></script>
        <script src="../js/inbox.js"></script>
    </body>
</html>
