<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Froggly | Home</title>
        <link rel="stylesheet" href="../css/shared.css">
        <link rel="stylesheet" href="../css/index.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    </head>
    <body>
        <header class="navbar">
            <div class="navbar-left">
                <span class="logo">Froggly!</span>
            </div>

            <div class="navbar-center">
                <input type="text" id="searchInput" placeholder="Looking for something? (¬_ ´¬ )">
            </div>

            <div class="navbar-right">
                <div class="inbox-wrapper">
                    <button id="inboxBtn">Inbox</button>
                    <div id="inboxModal" class="inbox-modal hidden">
                        <p class="inbox-title">Inbox</p>
                        <ul id="inboxList"></ul>
                    </div>            
                </div>
                <button id="addPostBtn">Add Post +</button>
                <a class="button-link" href="../html/wip.html">Changelog</a>

                <a href="../html/wip.html" class="profile-link">
                    <img src="../assets/defaultpfp.jpg" alt="Profile" class="navbar-avatar">
                </a>
            </div>
        </header>

        <main id="timeline" class="timeline-grid">
            <!-- posts will be added here! -->
        </main>

        <div id="addPostModal" class="modal hidden">
            <div class="modal-content">
                <button id="closeModalBtn" class="close-btn">&times;</button>
                <h2>New Post</h2>
                <form id="addPostForm">
                    <input type="text" id="imageUrlInput" placeholder="Image or GIF URL">
                    <input type="text" id="tagInput" placeholder="Tags">
                    <input type="text" id="captionInput" placeholder="Caption">
                    <input type="text" id="mediaTypeInput" placeholder="Media Type">
                    <input type="text" id="uploaderInput" placeholder="Your name">
                    <button type="submit" class="submit">Post</button>
                </form>
            </div>
        </div>

        <div id="viewPostModal" class="modal hidden">
            <div class="lightbox">
          
                <div class="lightbox-header">
                    <div class="lightbox-title-group">
                        <h2 id="viewPostCaption" class="lightbox-title"></h2>
                        <p class="lightbox-meta-line">
                        Added by <span id="viewPostUploader" class="lightbox-uploader"></span>
                        </p>
                    </div>
                    <div class="lightbox-header-actions">
                        <button id="closeViewPostBtn" class="close-btn">&times;</button>
                        <div class="dropdown-wrapper">
                            <button id="postOptionsBtn" class="options-btn">&#8942;</button>
                            <div id="postOptionsMenu" class="post-options-menu hidden">
                                <button class="edit-post-btn">Edit</button>
                                <button class="delete-post-btn">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
          
              <div class="lightbox-body">
                    <button id="prevPostBtn" class="lightbox-nav-arrow lightbox-nav-left">&#10094;</button>
            
                    <div class="lightbox-image-area">
                    <img id="viewPostImage" src="" alt="">
                    </div>
            
                    <button id="nextPostBtn" class="lightbox-nav-arrow lightbox-nav-right">&#10095;</button>
                </div>
            
                <div class="lightbox-thumbnail-strip" id="thumbnailStrip">
                    <!-- thumbnails render here -->
                </div>
            </div>
        </div>

        <script src="../js/data.js"></script>
        <script src="../js/timeline.js"></script>
        <script src="../js/viewPost.js"></script>
        <script src="../js/search.js"></script>
        <script src="../js/addPost.js"></script>
        <script src="../js/inbox.js"></script>
    </body>
</html>
