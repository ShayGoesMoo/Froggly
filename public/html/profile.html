<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Froggly | Profile</title>
        <link rel="stylesheet" href="../css/shared.css">
        <link rel="stylesheet" href="../css/profile.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&amp;family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&amp;family=Mukta+Vaani:wght@200;300;400;500;600;700;800&amp;family=Noto+Serif+NP+Hmong:wght@400..700&amp;family=Noto+Serif+Oriya:wght@400..700&amp;family=Nunito:ital,wght@0,200..1000;1,200..1000&amp;display=swap" rel="stylesheet">    
    </head>
    <body>
        <header class="navbar">
            <div class="navbar-left">
                <span class="logo">Froggly!</span>
            </div>
            <div class="navbar-right">
                <a class="button-link" href="../html/index.html">Timeline</a>
                <a class="button-link" href="../html/changelog.html">Changelog</a>

                <a href="../html/profile.html" class="profile-link">
                    <img src="../assets/defaultpfp.jpg" alt="Profile" class="navbar-avatar">
                </a>
            </div>
        </header>

        <main class="profile-container">
            <section class="profile-images">
                <div class="banner-wrapper">
                    <img src="../assets/defaultbanner.png" alt="Profile banner" class="profile-banner">
                </div>
                <div class="avatar-wrapper">
                    <img src="../assets/defaultpfp.jpg" alt="Profile avatar" class="profile-avatar">
                </div>
            </section>

            <section class="profile-info">
                <h1 class="profile-username">@username</h1>
                <p class="profile-bio">This is a placeholder. We can customize later!</p>
                <button class="edit-profile-btn">Edit Profile</button>
            </section>

            <secton class="profile-posts">
                <h2>Posts</h2>
                <div class="profile-posts-grid" id="profileTimeline">
                    <!-- user's posts will show up here -->
                </div>
            </secton>
        </main>
    </body>
</html>
